<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Formulario de contato</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <h1>Formulário de Contato</h1>
    <form action="https://formsubmit.co/aspbe256@gmail.com" method="POST"
    class="form">
    <input type="hidden" name="_captcha" value="false">
    <label for="nome">Nome</label>
     <input type="text" name="name" id="name" required>
     <label for="email">E-mail</label>
     <input type="email" name="email" id="email" required /> 
     <label for="message" id="message">Mensagem</label>
     <textarea name="message" placeholder="Escreva aqui..." id="" required></textarea>
     <input type="hidden" name="_next" value="http://127.0.0.1:5500/Obrigado.html">
     <button type="submit">ENVIAR</button>
</form>   
</body>
